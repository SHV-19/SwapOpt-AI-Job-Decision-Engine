<!doctype html>
<html>
  <head>
    <title>SwapOpt AI</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        width: 430px;
        background: #0f0f0f;
        color: #eeeeee;
      }
      .app { padding: 14px; }
      .header {
        background: linear-gradient(135deg, #151515, #202020);
        border: 1px solid #303030;
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .brand {
        font-size: 11px;
        letter-spacing: 1.8px;
        color: #9a9a9a;
        font-weight: 700;
      }
      .title {
        margin-top: 6px;
        font-size: 22px;
        font-weight: 800;
        color: #ffffff;
      }
      .subtitle {
        margin-top: 5px;
        font-size: 13px;
        color: #b5b5b5;
        line-height: 1.4;
      }
      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }
      button {
        border: 1px solid #333333;
        border-radius: 12px;
        padding: 11px 10px;
        background: #181818;
        color: #eeeeee;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: #242424; border-color: #4a4a4a; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      .primary {
        background: #f1f1f1;
        color: #111111;
        border-color: #f1f1f1;
      }
      .primary:hover { background: #ffffff; }
      .result {
        background: #171717;
        border: 1px solid #303030;
        border-radius: 14px;
        padding: 12px;
        min-height: 80px;
        font-size: 13px;
        line-height: 1.45;
        overflow-wrap: break-word;
      }
      a { color: #eeeeee; }
      ul { margin-top: 6px; padding-left: 18px; }
      li { margin-bottom: 5px; }
      .footer {
        margin-top: 10px;
        text-align: center;
        font-size: 11px;
        color: #777777;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="brand">SWAPOPT AI</div>
        <div class="title">Job Intelligence</div>
        <div class="subtitle">
           Decide where to apply, how much effort to spend, and how to position yourself.
        </div>
      </div>

<div class="button-grid">
<button id="analyzeButton" class="primary">Analyze Job</button>
<button id="tailorButton">Tailor Plan</button>
<button id="resumeDraftButton">Draft Resume</button>
<button id="applicationHelpButton">Application Answers</button>

<button id="copyInsightButton">Copy AI Context</button>

<button id="saveJobButton">Save Decision</button>

<button id="viewJobsButton">Recent Jobs</button>
<button id="viewAllJobsButton">Job Tracker</button>
<button id="viewArchivedButton">Archived</button>

<button id="exportJobsButton">Export CSV</button>
</div>

      <div id="result" class="result">
        Ready. Open a job posting and choose an action.
      </div>

      <div class="footer">Built to apply smarter, not faster.</div>
      <script src="app.js"></script>
    </div>
  </body>
</html>
